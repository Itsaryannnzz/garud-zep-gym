<!DOCTYPE html>
<html>
<head>
    <title>Edit Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2>Edit Member</h2>

    <form method="POST">

        <label>Plan</label>

<select id="plan"
        name="plan"
        class="form-control mb-3"
        onchange="updatePlan()">
    <option value="{{ member.plan }}">
        Current: {{ member.plan }}
    </option>

    <option value="₹600 - Gym Access">
        ₹600 - Gym Access
    </option>

    <option value="₹800 - Gym + Cardio">
        ₹800 - Gym + Cardio
    </option>

    <option value="₹1800 - 3 Month">
        ₹1800 - 3 Month
    </option>

    <option value="₹3999 - VIP">
        ₹3999 - VIP
    </option>
</select>

        <label>Start Date</label>
        <input type="date"
       id="join_date"
       name="join_date"
       onchange="updatePlan()"
               value="{{ member.join_date }}" required>

        <label>Expiry Date</label>
        <input type="date"
       id="expiry_date"
       name="expiry_date"
               value="{{ member.expiry_date }}" required>

        <button class="btn btn-success">Save</button>

        <a href="{{ url_for('owner_dashboard') }}"
           class="btn btn-secondary">
           Cancel
        </a>

    </form>
    <script>

function updatePlan(){

let plan =
document.getElementById("plan").value;

let join =
document.getElementById("join_date").value;

if(join=="") return;

let d = new Date(join);

if(plan.includes("600")){

d.setMonth(d.getMonth()+1);

}

else if(plan.includes("800")){

d.setMonth(d.getMonth()+1);

}

else if(plan.includes("1800")){

d.setMonth(d.getMonth()+3);

}

else if(plan.includes("3999")){

d.setMonth(d.getMonth()+3);

}

document.getElementById(
"expiry_date"
).value =
d.toISOString()
.substring(0,10);

}

</script>

</div>

</body>
</html>
