<!DOCTYPE html>
<html>
<head>
    <title>Edit Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2>Edit Member</h2>

    <form method="POST">

        <label>Plan</label>

<select id="plan"
        name="plan"
        class="form-control mb-3"
        onchange="updatePlan()"
        required>

    {% for plan in plans %}
    <option value="{{ plan.name }}"
            data-months="{{ plan.months }}"
            {% if member.plan == plan.name %}selected{% endif %}>
        {{ plan.name }} - ₹{{ plan.amount }} / {{ plan.months }} Month
    </option>
    {% endfor %}

</select>

        <label>Start Date</label>
        <input type="date"
       id="join_date"
       name="join_date"
       onchange="updatePlan()"
               value="{% if renew %}{{ current_date }}{% else %}{{ member.join_date }}{% endif %}" required>

        <label>Expiry Date</label>
        <input type="date"
       id="expiry_date"
       name="expiry_date"
               value="{{ member.expiry_date }}" required>

        <button class="btn btn-success">Save</button>

        <a href="{{ url_for('owner_dashboard') }}"
           class="btn btn-secondary">
           Cancel
        </a>

    </form>
    <script>
function updatePlan(){

    let planSelect = document.getElementById("plan");
    let months = parseInt(
        planSelect.options[planSelect.selectedIndex].getAttribute("data-months")
    );

    let join = document.getElementById("join_date").value;

    if(join == "") return;

    let d = new Date(join);

    d.setMonth(d.getMonth() + months);

    document.getElementById("expiry_date").value =
        d.toISOString().substring(0,10);
}
</script>

</div>

</body>
</html>
