<!DOCTYPE html>
<html>

<head>

<title>Receipt</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<section class="receipt-section">

<div class="receipt-box">

<h2>
GARUD ZEP <span>GYM</span>
</h2>

<hr>

<div class="receipt-row">

<strong>Name :</strong>

<span>

{{ member.name }}

</span>

</div>

<div class="receipt-row">

<strong>Phone :</strong>

<span>

{{ member.phone }}

</span>

</div>

<div class="receipt-row">

<strong>Plan :</strong>

<span>

{{ member.plan }}

</span>

</div>

<div class="receipt-row">

<strong>Status :</strong>

<span>

{{ member.payment_status }}

</span>

</div>

<div class="receipt-row">

<strong>Expiry :</strong>

<span>

{{ member.expiry_date }}

</span>

</div>

<br>

<a href="{{ url_for('owner_dashboard') }}"
class="main-btn">
<a href="https://wa.me/91{{ member.phone }}?text=Hello {{ member.name }},

Garud Zep Gym Receipt

Plan : {{ member.plan }}

Status : {{ member.payment_status }}

Expiry : {{ member.expiry_date }}

Thank you for joining Garud Zep Gym."

target="_blank"

class="main-btn">

Send To WhatsApp

</a>

<br><br>

<a href="{{ url_for('owner_dashboard') }}"

class="main-btn">

Back Dashboard

</a>

</div>

</section>

</body>

</html>
