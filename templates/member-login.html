<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Member Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<section class="login-section">

<div class="login-box">

<h2>Member Login</h2>

<form method="POST">

<input
type="text"
name="phone"
class="form-control mb-3"
placeholder="Enter Mobile Number"
required>

<button
type="submit"
class="main-btn border-0 w-100">

Login

</button>

</form>

<p class="mt-4">

<a href="{{ url_for('home') }}"
class="text-danger">

Back to Home

</a>

</p>

</div>

</section>

</body>

</html>
