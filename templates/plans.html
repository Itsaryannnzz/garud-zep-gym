<!DOCTYPE html>
<html>

<head>

<title>Plans</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h2>Manage Plans</h2>

{% for plan in plans %}

<form method="POST"
action="{{ url_for('edit_plan', id=plan.id) }}">

<div class="row mb-3">

<div class="col-md-4">

<input
name="name"
class="form-control"

value="{{ plan.name }}">

</div>

<div class="col-md-3">

<input
type="number"

name="amount"

class="form-control"

value="{{ plan.amount }}">

</div>

<div class="col-md-3">

<input
type="number"

name="months"

class="form-control"

value="{{ plan.months }}">

</div>

<div class="col-md-2">

<button
class="btn btn-success">

Save

</button>

</div>

</div>

</form>

{% endfor %}

<a
href="{{ url_for('owner_dashboard') }}"

class="btn btn-secondary">

Back

</a>

</div>

</body>

</html>
