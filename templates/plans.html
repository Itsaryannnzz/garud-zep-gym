<!DOCTYPE html>
<html>
<head>
    <title>Manage Plans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">

    <h2 class="mb-4">Manage Plans</h2>

    {% if plans %}

        {% for plan in plans %}
        <form method="POST" action="{{ url_for('edit_plan', id=plan.id) }}">
            <div class="row g-2 mb-3">
                <div class="col-md-4">
                    <input name="name" class="form-control" value="{{ plan.name }}" required>
                </div>

                <div class="col-md-3">
                    <input type="number" name="amount" class="form-control" value="{{ plan.amount }}" required>
                </div>

                <div class="col-md-3">
                    <input type="number" name="months" class="form-control" value="{{ plan.months }}" required>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-success w-100">Save</button>
                </div>
            </div>
        </form>
        {% endfor %}

    {% else %}

        <div class="alert alert-warning">
            No plans found. Open /init-db once.
        </div>

    {% endif %}

    <a href="{{ url_for('owner_dashboard') }}" class="btn btn-secondary mt-3">
        Back
    </a>

</div>

</body>
</html>
